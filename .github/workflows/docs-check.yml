name: Documentation Check

on:
  pull_request:
    paths:
      - 'docs/**'
      - '*.md'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '*.md'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required documentation files
        run: |
          echo "Checking for required documentation files..."

          required_files=(
            "docs/STRUCTURE.md"
            "docs/RELEASE.md"
            "docs/STYLE_GUIDE.md"
            "README.md"
          )

          missing_files=()
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              missing_files+=("$file")
            else
              echo "Found: $file"
            fi
          done

          if [ ${#missing_files[@]} -ne 0 ]; then
            echo ""
            echo "Error: Missing required documentation files!"
            exit 1
          fi

          echo ""
          echo "All required documentation files present!"

      - name: Validate Markdown format
        run: |
          echo "Validating Markdown files..."

          # Check that markdown files have proper structure
          for file in $(find docs -name "*.md" -type f); do
            echo "Checking $file..."

            # Check file is not empty
            if [ ! -s "$file" ]; then
              echo "Error: $file is empty!"
              exit 1
            fi

            # Check for at least one heading
            if ! grep -q "^#" "$file"; then
              echo "Warning: $file has no headings"
            fi

            echo "$file is valid"
          done

          echo ""
          echo "Markdown validation complete!"

      - name: Check for broken internal links
        run: |
          echo "Checking for broken internal links..."

          # Find all markdown files
          md_files=$(find . -name "*.md" -type f | grep -v ".git")

          # Extract internal links and verify they exist
          for file in $md_files; do
            echo "Checking links in $file..."

            # Look for markdown links [text](path) where path doesn't start with http
            grep -oP '\]\(\K[^)]+' "$file" | grep -v "^http" | while read -r link; do
              # Skip anchors
              if [[ "$link" =~ ^# ]]; then
                continue
              fi

              # Resolve relative path
              dir=$(dirname "$file")
              target=$(realpath -m "$dir/$link" 2>/dev/null || echo "$dir/$link")

              # Check if target exists (allow non-existent for now with warning)
              if [ ! -e "$target" ]; then
                echo "Warning: Broken link in $file -> $link (target: $target)"
              fi
            done
          done

          echo ""
          echo "Link check complete!"

      - name: Documentation validation summary
        run: |
          echo "## Documentation Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All documentation checks passed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validated:" >> $GITHUB_STEP_SUMMARY
          echo "- Required files present" >> $GITHUB_STEP_SUMMARY
          echo "- Markdown format valid" >> $GITHUB_STEP_SUMMARY
          echo "- Internal links checked" >> $GITHUB_STEP_SUMMARY
